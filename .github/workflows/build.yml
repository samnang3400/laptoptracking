name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        cd client
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        cd client
        pyinstaller --onefile --name LaptopMonitor --add-data "config.ini;." src/main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LaptopMonitor
        path: client/dist/LaptopMonitor.exe
